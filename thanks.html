<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — Kalos Track Club</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.62);
      --blue: #4169e1;
      --blue-hover: #5478ee;
      --blue-glow: rgba(65, 105, 225, 0.35);
      --border-strong: rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .top {
      padding: 22px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .wordmark {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 720px;
      height: 720px;
      background: radial-gradient(circle, rgba(65, 105, 225, 0.22) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      text-align: center;
    }

    .check {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: rgba(65, 105, 225, 0.14);
      border: 1px solid rgba(65, 105, 225, 0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 0 6px rgba(65, 105, 225, 0.06);
    }

    .check svg {
      width: 32px;
      height: 32px;
      stroke: var(--blue);
    }

    h1 {
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
      margin-bottom: 20px;
    }

    p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      background: var(--blue);
      color: #fff;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--blue-glow);
    }

    footer {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.42);
      letter-spacing: 0.02em;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <header class="top">
    <a href="/" class="wordmark">Kalos Track Club</a>
  </header>

  <main>
    <div class="card">
      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h1>Thanks for submitting.</h1>
      <p>Callum will reach out to you soon. Looking forward to seeing you on the track.</p>
      <a href="/" class="btn">Back to home</a>
    </div>
  </main>

  <footer>Every Thursday @ 5PM. Campbell Community Center, Campbell CA.</footer>
</body>
</html>
